<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brian Kimathi | Pixel Monogram</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f5f5f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Inter, sans-serif;
      }

      svg {
        width: 900px;
        max-width: 90vw;
      }

      .pixel {
        shape-rendering: crispEdges;
      }

      text {
        fill: #222;
      }

      .subtitle {
        font-size: 12px;
        letter-spacing: 6px;
        fill: #888;
      }

      .name {
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .grid {
        stroke: #e8e8e8;
        stroke-width: 1;
      }
    </style>
  </head>

  <body>
    <svg viewBox="0 0 900 260">
      <!-- Background -->
      <rect width="900" height="260" fill="#fafaf8" />

      <!-- Grid -->
      <g class="grid">
        <path d="M0 20H900" />
        <path d="M0 60H900" />
        <path d="M0 100H900" />
        <path d="M0 140H900" />
        <path d="M0 180H900" />
        <path d="M0 220H900" />

        <path d="M20 0V260" />
        <path d="M60 0V260" />
        <path d="M100 0V260" />
        <path d="M140 0V260" />
        <path d="M180 0V260" />
        <path d="M220 0V260" />
        <path d="M260 0V260" />
      </g>

      <!-- Pixel BK -->
      <g class="pixel" fill="#222">
        <!-- B -->
        <rect x="70" y="40" width="20" height="20" />
        <rect x="70" y="60" width="20" height="20" />
        <rect x="70" y="80" width="20" height="20" />
        <rect x="70" y="100" width="20" height="20" />
        <rect x="70" y="120" width="20" height="20" />
        <rect x="70" y="140" width="20" height="20" />

        <rect x="90" y="40" width="20" height="20" />
        <rect x="110" y="40" width="20" height="20" />
        <rect x="130" y="60" width="20" height="20" />
        <rect x="110" y="80" width="20" height="20" />
        <rect x="90" y="80" width="20" height="20" />
        <rect x="130" y="100" width="20" height="20" />
        <rect x="90" y="120" width="20" height="20" />
        <rect x="110" y="120" width="20" height="20" />
        <rect x="130" y="140" width="20" height="20" />
        <rect x="90" y="160" width="20" height="20" />
        <rect x="110" y="160" width="20" height="20" />

        <!-- K -->
        <rect x="190" y="40" width="20" height="20" />
        <rect x="190" y="60" width="20" height="20" />
        <rect x="190" y="80" width="20" height="20" />
        <rect x="190" y="100" width="20" height="20" />
        <rect x="190" y="120" width="20" height="20" />
        <rect x="190" y="140" width="20" height="20" />
        <rect x="190" y="160" width="20" height="20" />

        <rect x="210" y="100" width="20" height="20" />
        <rect x="230" y="80" width="20" height="20" />
        <rect x="250" y="60" width="20" height="20" />
        <rect x="230" y="120" width="20" height="20" />
        <rect x="250" y="140" width="20" height="20" />
        <rect x="270" y="160" width="20" height="20" />
      </g>

      <!-- Divider -->
      <line x1="340" y1="50" x2="340" y2="170" stroke="#ddd" />

      <!-- Name -->
      <text x="390" y="95" class="name">Brian Kimathi</text>

      <text x="390" y="130" class="subtitle">
        SOFTWARE ENGINEER • AI • SYSTEMS
      </text>

      <!-- Tiny pixel cursor -->
      <rect x="390" y="155" width="10" height="20" fill="#222">
        <animate
          attributeName="opacity"
          values="1;0;1"
          dur="1s"
          repeatCount="indefinite"
        />
      </rect>
    </svg>
  </body>
</html>
