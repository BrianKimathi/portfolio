# ─── Production Profile ───
# Activate with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod
# Or: java -jar backend.jar --spring.profiles.active=prod

# Database (set via env vars or RDS)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# App
app.base-url=${APP_BASE_URL:http://localhost:8080}

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=86400000

# CORS — set FRONTEND_URL to your deployed frontend domain
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# GitHub (set via env vars or admin panel)
github.app.id=${GITHUB_APP_ID:}
github.app.private-key-path=${GITHUB_PRIVATE_KEY_PATH:}
github.app.installation-id=${GITHUB_INSTALLATION_ID:}
github.owner=${GITHUB_OWNER:}
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}

# Docker (host-specific, configure per environment)
# docker.host=${DOCKER_HOST:unix:///var/run/docker.sock}
