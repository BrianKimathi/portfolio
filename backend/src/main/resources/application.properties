spring.application.name=portfolio

# Use H2 in-memory for development
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# App
app.base-url=http://localhost:8080

# JWT
jwt.secret=ThisIsASecretKeyForJwtTokenGenerationThatIsLongEnoughForHmacSha256!!
jwt.expiration-ms=86400000

# GitHub App Integration
github.app.id=
github.app.private-key-path=
github.app.installation-id=
github.owner=
github.webhook.secret=

# Docker Engine (optional — uncomment to configure)
# docker.host=unix:///var/run/docker.sock
# docker.tls-verify=false
# docker.cert-path=
